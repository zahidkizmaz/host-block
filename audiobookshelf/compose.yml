services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.28.0@sha256:b854ec08b1a7bee67c3274f1df5dce2143f48e05cbce5ada356c38662694f7fe
    ports:
      - 13378:80
    volumes:
      - ./data/audiobooks:/audiobooks
      - ./data/metadata:/metadata
      - ./data/podcasts:/podcasts
      - ./data/config:/config
    environment:
      - TZ=Europe/Berlin
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "abs"
      glance.name: Audiobookshelf
      glance.icon: di:audiobookshelf
      glance.url: https://abs.quoll-ratio.ts.net
