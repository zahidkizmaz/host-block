services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.23.0@sha256:2d8bee3e87e860d67e11e13b5c42d97cb1fe071de53dea5502b3a9292e75e024
    ports:
      - 13378:80
    volumes:
      - ./data/audiobooks:/audiobooks
      - ./data/metadata:/metadata
      - ./data/podcasts:/podcasts
      - ./data/config:/config
    environment:
      - TZ=Europe/Berlin
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "abs"
      glance.name: Audiobookshelf
      glance.icon: di:audiobookshelf
      glance.url: https://abs.quoll-ratio.ts.net
