services:
  portainer:
    image: docker.io/portainer/portainer-ce:lts@sha256:5f3f03a7d2e34fe836837f00183aa52ba1e914c9f51b9ef359aa5651a474ff5b
    command: --http-enabled
    restart: unless-stopped
    container_name: portainer
    ports:
      - "9443:9443"
      - "9000:9000"
    volumes:
      - portainer_data:/data
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "portainer"
      tsdproxy.container_port: 9000
      glance.name: Portainer
      glance.icon: di:portainer
      glance.url: https://portainer.quoll-ratio.ts.net
volumes:
  portainer_data:
